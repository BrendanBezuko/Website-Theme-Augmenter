<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOOM HUD</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <p class="eyebrow">UAC // NEURAL LINK</p>
      <h1>DOOM HUD</h1>
    </header>

    <p class="section-label">SITES</p>
    <div class="site-grid" id="site-grid">
      <label class="site-chip" for="site-youtube">
        <input id="site-youtube" type="checkbox" data-site="youtube" checked />
        <span>YouTube</span>
      </label>
      <label class="site-chip" for="site-facebook">
        <input id="site-facebook" type="checkbox" data-site="facebook" checked />
        <span>Facebook</span>
      </label>
      <label class="site-chip" for="site-twitter">
        <input id="site-twitter" type="checkbox" data-site="twitter" checked />
        <span>X / Twitter</span>
      </label>
      <label class="site-chip" for="site-linkedin">
        <input id="site-linkedin" type="checkbox" data-site="linkedin" checked />
        <span>LinkedIn</span>
      </label>
    </div>

    <p class="section-label">FEATURES</p>

    <label class="toggle-row" for="enabled">
      <span>
        <strong>THEME</strong>
        <small id="status-text">ARMING…</small>
      </span>
      <input id="enabled" type="checkbox" checked />
      <span class="switch" aria-hidden="true"></span>
    </label>

    <label class="toggle-row" for="session-timer">
      <span>
        <strong>SESSION TIMER</strong>
        <small id="session-status">ON</small>
      </span>
      <input id="session-timer" type="checkbox" checked />
      <span class="switch" aria-hidden="true"></span>
    </label>

    <label class="toggle-row" for="hide-shorts">
      <span>
        <strong>HIDE SHORTS / REELS</strong>
        <small id="shorts-status">OFF</small>
      </span>
      <input id="hide-shorts" type="checkbox" />
      <span class="switch" aria-hidden="true"></span>
    </label>

    <p class="hint">
      Features only apply on sites that are turned on above.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
